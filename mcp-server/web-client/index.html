<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel MCP Studio</title>
<style>
:root { --navy: #1B2A4A; --blue: #2B579A; --green: #0D7C3D; --red: #C00000; --bg: #f0f2f5; --card: #fff; --border: #d6dce4; --text: #333; --muted: #667085; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
header { background: var(--navy); color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 18px; font-weight: 600; }
header .status { margin-left: auto; font-size: 13px; display: flex; align-items: center; gap: 6px; }
header .dot { width: 8px; height: 8px; border-radius: 50%; }
header .dot.on { background: #4ade80; } header .dot.off { background: #f87171; }
.main { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 280px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar h2 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px 8px; }
.tool-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
.tool-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 2px; transition: background 0.15s; }
.tool-item:hover { background: #e8f0fe; }
.tool-item.active { background: #d0e0ff; font-weight: 600; }
.tool-item .desc { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { padding: 12px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.toolbar .wb-label { font-size: 13px; color: var(--muted); }
.toolbar select, .toolbar input { font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; }
.toolbar select { min-width: 140px; }
.btn { padding: 6px 14px; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: 500; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--blue); color: #fff; }
.btn-success { background: var(--green); color: #fff; }
.btn-danger { background: var(--red); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.panels { flex: 1; display: flex; overflow: hidden; }
.panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.panel + .panel { border-left: 1px solid var(--border); }
.panel-header { padding: 8px 16px; background: #f8f9fa; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
.panel-body { flex: 1; overflow-y: auto; padding: 16px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; font-size: 13px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; }
.form-group textarea { min-height: 80px; font-family: 'SF Mono', Monaco, monospace; font-size: 12px; resize: vertical; }
.form-group .hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
.result { background: #f8f9fa; border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: 'SF Mono', Monaco, monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; max-height: 100%; overflow-y: auto; }
.result.error { border-color: var(--red); background: #fff5f5; color: var(--red); }
.result.success { border-color: var(--green); background: #f0fdf4; }
.log-entry { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
.log-entry .time { color: var(--muted); font-family: monospace; font-size: 11px; }
.log-entry .method { font-weight: 600; color: var(--blue); }
.grid-preview { width: 100%; border-collapse: collapse; font-size: 12px; }
.grid-preview th { background: var(--navy); color: #fff; padding: 4px 8px; font-weight: 500; position: sticky; top: 0; }
.grid-preview td { padding: 4px 8px; border: 1px solid var(--border); }
.grid-preview tr:nth-child(even) td { background: #f8f9fa; }
.empty-state { text-align: center; padding: 40px; color: var(--muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.quick-actions .btn { font-size: 12px; padding: 8px; text-align: center; }
.search-box { padding: 8px; border-bottom: 1px solid var(--border); }
.search-box input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
</style>
</head>
<body>
<header>
  <span style="font-size:24px">📊</span>
  <h1>Excel MCP Studio</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="quick-actions">
      <button class="btn btn-primary" onclick="quickCreate()">+ New Workbook</button>
      <button class="btn btn-outline" onclick="quickOpen()">📂 Open File</button>
      <button class="btn btn-success" onclick="quickSave()">💾 Save</button>
      <button class="btn btn-outline" onclick="quickDescribe()">🔍 Describe</button>
    </div>
    <div class="search-box"><input type="text" placeholder="Search tools..." oninput="filterTools(this.value)"></div>
    <h2>Tools (<span id="toolCount">0</span>)</h2>
    <div class="tool-list" id="toolList"></div>
  </div>
  <div class="content">
    <div class="toolbar">
      <span class="wb-label">Workbook:</span>
      <select id="wbSelect" onchange="selectWorkbook()"><option value="">— none —</option></select>
      <span class="wb-label" style="margin-left:12px">Sheet:</span>
      <select id="sheetSelect"><option value="">—</option></select>
      <div style="margin-left:auto; display:flex; gap:6px">
        <button class="btn btn-outline" onclick="refreshSheets()">↻ Sheets</button>
        <button class="btn btn-outline" onclick="readCurrentSheet()">📖 Read</button>
      </div>
    </div>
    <div class="panels">
      <div class="panel">
        <div class="panel-header">Tool Input</div>
        <div class="panel-body" id="inputPanel">
          <div class="empty-state"><div class="icon">🛠️</div><p>Select a tool from the sidebar or use quick actions</p></div>
        </div>
        <div style="padding:12px 16px; border-top:1px solid var(--border)">
          <button class="btn btn-primary" id="execBtn" onclick="executeTool()" disabled style="width:100%">Execute Tool</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">Result</div>
        <div class="panel-body" id="resultPanel">
          <div class="empty-state"><div class="icon">📋</div><p>Results will appear here</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const MCP_URL = location.origin + '/mcp';
let sessionId = null;
let tools = [];
let activeTool = null;
let workbooks = {};
let msgId = 0;

// ── MCP Protocol ──
async function mcpRequest(method, params = {}) {
  const id = ++msgId;
  const body = { jsonrpc: '2.0', id, method, params };
  const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' };
  if (sessionId) headers['Mcp-Session-Id'] = sessionId;

  const res = await fetch(MCP_URL, { method: 'POST', headers, body: JSON.stringify(body) });
  const sid = res.headers.get('mcp-session-id');
  if (sid) sessionId = sid;

  const text = await res.text();
  // Parse SSE: find last "data: {...}" line
  const lines = text.split('\n');
  for (let i = lines.length - 1; i >= 0; i--) {
    const line = lines[i];
    if (line.startsWith('data: ') && line.includes('{')) {
      return JSON.parse(line.slice(6));
    }
  }
  return null;
}

async function mcpNotify(method, params = {}) {
  const body = { jsonrpc: '2.0', method, params };
  const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' };
  if (sessionId) headers['Mcp-Session-Id'] = sessionId;
  await fetch(MCP_URL, { method: 'POST', headers, body: JSON.stringify(body) });
}

// ── Connect ──
async function connect() {
  try {
    const res = await mcpRequest('initialize', {
      protocolVersion: '2025-03-26',
      capabilities: {},
      clientInfo: { name: 'Excel MCP Studio', version: '1.0' }
    });
    if (res?.result) {
      await mcpNotify('notifications/initialized');
      setStatus(true, `Connected — ${res.result.serverInfo?.name || 'MCP'}`);
      await loadTools();
    }
  } catch (e) {
    setStatus(false, 'Connection failed');
    setTimeout(connect, 3000);
  }
}

function setStatus(on, text) {
  document.getElementById('statusDot').className = 'dot ' + (on ? 'on' : 'off');
  document.getElementById('statusText').textContent = text;
}

// ── Tools ──
async function loadTools() {
  const res = await mcpRequest('tools/list');
  if (res?.result?.tools) {
    tools = res.result.tools.sort((a, b) => a.name.localeCompare(b.name));
    document.getElementById('toolCount').textContent = tools.length;
    renderTools(tools);
  }
}

function renderTools(list) {
  const el = document.getElementById('toolList');
  el.innerHTML = list.map(t => `
    <div class="tool-item ${activeTool?.name === t.name ? 'active' : ''}" onclick="selectTool('${t.name}')">
      <div>${t.name}</div>
      <div class="desc">${t.description}</div>
    </div>
  `).join('');
}

function filterTools(q) {
  const lower = q.toLowerCase();
  renderTools(tools.filter(t => t.name.includes(lower) || t.description.toLowerCase().includes(lower)));
}

function selectTool(name) {
  activeTool = tools.find(t => t.name === name);
  renderTools(tools.filter(t => document.querySelector('.search-box input').value ? t.name.includes(document.querySelector('.search-box input').value) || t.description.toLowerCase().includes(document.querySelector('.search-box input').value) : true));
  renderInputForm();
  document.getElementById('execBtn').disabled = false;
}

// ── Input Form Generation ──
function renderInputForm() {
  if (!activeTool) return;
  const schema = activeTool.inputSchema;
  const props = schema.properties || {};
  const required = schema.required || [];

  let html = `<h3 style="margin-bottom:12px;font-size:14px">${activeTool.name}</h3>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px">${activeTool.description}</p>`;

  for (const [key, prop] of Object.entries(props)) {
    const req = required.includes(key);
    const label = key + (req ? ' *' : '');
    let defVal = '';

    // Auto-fill workbook_id and sheet_name
    if (key === 'workbook_id') defVal = document.getElementById('wbSelect').value;
    else if (key === 'sheet_name') defVal = document.getElementById('sheetSelect').value;
    else if (prop.default !== undefined && prop.default !== null) defVal = prop.default;

    const pType = resolveType(prop, schema);

    if (pType === 'boolean') {
      html += `<div class="form-group"><label>${label}</label>
        <select data-key="${key}"><option value="">—</option><option value="true" ${defVal===true?'selected':''}>true</option><option value="false" ${defVal===false?'selected':''}>false</option></select></div>`;
    } else if (prop.enum) {
      html += `<div class="form-group"><label>${label}</label>
        <select data-key="${key}"><option value="">—</option>${prop.enum.map(v => `<option value="${v}">${v}</option>`).join('')}</select></div>`;
    } else if (pType === 'object' || pType === 'array') {
      html += `<div class="form-group"><label>${label}</label>
        <textarea data-key="${key}" data-json="true" placeholder='${pType === 'array' ? '[\n  \n]' : '{\n  \n}'}'>${defVal ? JSON.stringify(defVal, null, 2) : ''}</textarea>
        <div class="hint">JSON ${pType}</div></div>`;
    } else {
      html += `<div class="form-group"><label>${label}</label>
        <input type="text" data-key="${key}" value="${defVal}" placeholder="${prop.description || ''}">
        ${prop.description ? `<div class="hint">${prop.description}</div>` : ''}</div>`;
    }
  }
  document.getElementById('inputPanel').innerHTML = html;
}

function resolveType(prop, schema) {
  if (prop.$ref) {
    const refName = prop.$ref.split('/').pop();
    const def = schema.$defs?.[refName];
    if (def?.enum) return 'enum';
    return def?.type || 'string';
  }
  if (prop.anyOf) {
    const nonNull = prop.anyOf.find(a => a.type !== 'null' && !a.type?.includes?.('null'));
    if (nonNull?.$ref) return resolveType(nonNull, schema);
    if (nonNull?.enum) return 'enum';
    return nonNull?.type || 'string';
  }
  const t = prop.type;
  if (Array.isArray(t)) return t.find(x => x !== 'null') || 'string';
  return t || 'string';
}

// ── Execute ──
async function executeTool() {
  if (!activeTool) return;
  const params = {};
  document.querySelectorAll('#inputPanel [data-key]').forEach(el => {
    const key = el.dataset.key;
    let val = el.value.trim();
    if (!val) return;
    if (el.dataset.json) { try { val = JSON.parse(val); } catch(e) {} }
    else if (val === 'true') val = true;
    else if (val === 'false') val = false;
    else if (/^-?\d+(\.\d+)?$/.test(val)) val = Number(val);
    params[key] = val;
  });

  showResult('Executing...', '');
  try {
    const res = await mcpRequest('tools/call', { name: activeTool.name, arguments: params });
    if (res?.result) {
      const content = res.result.content?.map(c => c.text || JSON.stringify(c)).join('\n') || JSON.stringify(res.result, null, 2);
      const isErr = res.result.isError;
      showResult(content, isErr ? 'error' : 'success');

      // Auto-track workbooks
      if (activeTool.name === 'create_workbook' || activeTool.name === 'open_workbook') {
        try {
          const data = JSON.parse(content);
          const wbId = data.data?.workbook_id || data.workbook_id;
          if (wbId) addWorkbook(wbId, data.data?.file_path || activeTool.name === 'open_workbook' ? params.file_path || 'Opened' : 'New Workbook');
        } catch(e) {}
      }
    } else if (res?.error) {
      showResult(JSON.stringify(res.error, null, 2), 'error');
    }
  } catch (e) {
    showResult(e.message, 'error');
  }
}

function showResult(text, cls) {
  document.getElementById('resultPanel').innerHTML = `<div class="result ${cls}">${escHtml(text)}</div>`;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Workbook Management ──
function addWorkbook(id, name) {
  workbooks[id] = name;
  const sel = document.getElementById('wbSelect');
  if (!sel.querySelector(`option[value="${id}"]`)) {
    sel.innerHTML += `<option value="${id}">${name} (${id.slice(0,8)})</option>`;
  }
  sel.value = id;
  refreshSheets();
  // Update form if workbook_id field exists
  const wbInput = document.querySelector('[data-key="workbook_id"]');
  if (wbInput) wbInput.value = id;
}

function selectWorkbook() { refreshSheets(); }

async function refreshSheets() {
  const wbId = document.getElementById('wbSelect').value;
  const sel = document.getElementById('sheetSelect');
  sel.innerHTML = '<option value="">—</option>';
  if (!wbId) return;
  try {
    const res = await mcpRequest('tools/call', { name: 'list_sheets', arguments: { workbook_id: wbId } });
    const text = res?.result?.content?.[0]?.text || '';
    try {
      const data = JSON.parse(text);
      (data.sheets || []).forEach(s => { sel.innerHTML += `<option value="${s}">${s}</option>`; });
      if (data.sheets?.length) sel.value = data.sheets[0];
    } catch(e) {}
  } catch(e) {}
}

async function readCurrentSheet() {
  const wbId = document.getElementById('wbSelect').value;
  const sheet = document.getElementById('sheetSelect').value;
  if (!wbId || !sheet) return showResult('Select a workbook and sheet first', 'error');
  try {
    const res = await mcpRequest('tools/call', { name: 'read_sheet', arguments: { workbook_id: wbId, sheet_name: sheet } });
    const text = res?.result?.content?.[0]?.text || '';
    try {
      const data = JSON.parse(text);
      if (data.rows) {
        let html = '<table class="grid-preview"><thead><tr><th>#</th>';
        const maxCols = Math.max(...data.rows.map(r => r.length), 0);
        for (let c = 0; c < maxCols; c++) html += `<th>${String.fromCharCode(65 + c % 26)}</th>`;
        html += '</tr></thead><tbody>';
        data.rows.forEach((row, i) => {
          html += `<tr><td style="background:#f0f0f0;font-weight:600;text-align:center">${i + 1}</td>`;
          for (let c = 0; c < maxCols; c++) html += `<td>${row[c] ?? ''}</td>`;
          html += '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById('resultPanel').innerHTML = html;
      } else {
        showResult(text, 'success');
      }
    } catch(e) { showResult(text, 'success'); }
  } catch(e) { showResult(e.message, 'error'); }
}

// ── Quick Actions ──
async function quickCreate() {
  try {
    const res = await mcpRequest('tools/call', { name: 'create_workbook', arguments: {} });
    const text = res?.result?.content?.[0]?.text || '';
    showResult(text, 'success');
    const data = JSON.parse(text);
    const wbId = data.data?.workbook_id || data.workbook_id;
    if (wbId) addWorkbook(wbId, 'New Workbook');
  } catch(e) { showResult(e.message, 'error'); }
}

function quickOpen() {
  const path = prompt('Enter file path:');
  if (!path) return;
  selectTool('open_workbook');
  setTimeout(() => {
    const el = document.querySelector('[data-key="file_path"]');
    if (el) el.value = path;
    executeTool();
  }, 100);
}

async function quickSave() {
  const wbId = document.getElementById('wbSelect').value;
  if (!wbId) return showResult('No workbook selected', 'error');
  const path = prompt('Save path:', `${wbId.slice(0,8)}.xlsx`);
  if (!path) return;
  try {
    const res = await mcpRequest('tools/call', { name: 'save_workbook', arguments: { workbook_id: wbId, file_path: path } });
    showResult(res?.result?.content?.[0]?.text || 'Saved', 'success');
  } catch(e) { showResult(e.message, 'error'); }
}

async function quickDescribe() {
  const wbId = document.getElementById('wbSelect').value;
  if (!wbId) return showResult('No workbook selected', 'error');
  try {
    const res = await mcpRequest('tools/call', { name: 'describe_workbook', arguments: { workbook_id: wbId } });
    showResult(res?.result?.content?.[0]?.text || '', 'success');
  } catch(e) { showResult(e.message, 'error'); }
}

// ── Init ──
connect();
</script>
</body>
</html>
